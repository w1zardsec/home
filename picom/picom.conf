# ===== SHADOW =====
shadow = true;
shadow-radius = 8;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "window_type = 'dock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ===== BLUR =====
blur-method = "dual_kawase";
blur-strength = 2.5; 
blur-background = true;
blur-background-frame = true;
blur-kern = "3x3box";
blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
];
blur-background-exclude = [
    "class_g != 'St'"
];

# ===== ANIMASI =====
animations = true;
animation-stiffness = 200;
animation-dampening = 30;
animation-mass = 1;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";

# ===== FADING =====
fading = true;
fade-in-step = 0.5;
fade-out-step = 0.5;
fade-delta = 8;

# ===== ROUNDING =====
corner-radius = 0;
rounded-corners-exclude = [
    "window_type = 'dock'"
];

# ===== GENERAL =====
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;

# ===== OPACITY =====
opacity-rule = [
    "85:class_g = 'St'"
];
