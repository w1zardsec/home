# ===== SHADOW =====
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.6;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "window_type = 'dock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ===== BLUR =====
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-frame = true;
blur-kern = "3x3box";
blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ===== ANIMASI =====
animations = true;
animation-stiffness = 200;
animation-dampening = 25;
animation-mass = 1;
animation-for-open-window = "zoom";      # zoom, fly-in, slide-down, slide-up
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";

# ===== FADING =====
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

# ===== ROUNDING =====
corner-radius = 0;
rounded-corners-exclude = [
    "window_type = 'dock'"
];

# ===== GENERAL =====
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
